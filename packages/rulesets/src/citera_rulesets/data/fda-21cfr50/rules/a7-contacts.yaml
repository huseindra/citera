id: fda-50.25-a7-contacts
citation: 21 CFR 50.25(a)(7)
title: Whom to contact
description: 'An explanation of whom to contact for answers to pertinent questions about the
  research and research subjects'' rights, and whom to contact in the event of a research-related
  injury to the subject.

  '
retrieval_queries:
- who to contact with questions about the study phone number
- questions about your rights as a research participant IRB contact
- who to call research related injury emergency
evaluation_criteria: 'The ICF must identify whom to contact for questions about the research,
  whom to contact about research participants'' rights (typically the IRB), and whom to contact
  in the event of a research-related injury. All three contact purposes must be covered.

  '
severity: major
statutory_refs:
- 21 CFR 50.25(a)(7)
remediation: Provide contacts for research questions, subjects' rights, and research-related
  injury.

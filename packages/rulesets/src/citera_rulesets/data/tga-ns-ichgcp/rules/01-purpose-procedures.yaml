id: tga-consent-purpose-procedures
citation: NS 2.2.2; E6(R2) 4.8.10(a),(b),(d),(s) / E6(R3) 2.8.10(a),(b),(d),(t)
title: Purpose, methods, procedures, and duration
description: 'Adequate understanding of the purpose and methods of the research: that the
  trial involves research, its purpose, the procedures to be followed (including invasive
  procedures), and the expected duration of participation.'
retrieval_queries:
- purpose of this research study
- study procedures visits tests blood samples
- how long will participation last duration
evaluation_criteria: The ICF must state the study is research, explain its purpose, describe
  the procedures (flagging invasive ones), and state the expected duration, all consistent
  with the protocol.
severity: critical
statutory_refs:
- National Statement (2025) 2.2.2
- ICH E6(R2) 4.8.10(a)
- ICH E6(R2) 4.8.10(b)
- ICH E6(R2) 4.8.10(d)
- ICH E6(R2) 4.8.10(s)
- ICH E6(R3) Annex 1 2.8.10(a)
- ICH E6(R3) Annex 1 2.8.10(b)
- ICH E6(R3) Annex 1 2.8.10(d)
- ICH E6(R3) Annex 1 2.8.10(t)
remediation: Describe the research purpose, full visit/procedure schedule, and total participation
  time.

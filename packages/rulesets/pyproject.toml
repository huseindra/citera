[project]
name = "citera-rulesets"
version = "0.1.0"
description = "Citera declarative regulatory rule sets and loader"
requires-python = ">=3.12"
dependencies = ["citera-schemas", "pyyaml>=6.0"]

[tool.uv.sources]
citera-schemas = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/citera_rulesets"]

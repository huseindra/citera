[project]
name = "citera-pipeline"
version = "0.1.0"
description = "Citera AI pipeline library: ingest, retrieve, evaluate, ground"
requires-python = ">=3.12"
dependencies = ["citera-schemas", "pdfplumber>=0.11"]

[tool.uv.sources]
citera-schemas = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/citera_pipeline"]

[project]
name = "citera-schemas"
version = "0.1.0"
description = "Citera core data contracts (pure Pydantic, zero I/O)"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/citera_schemas"]

# Development only — hardcoded credentials, no TLS.
# Do not use this file as a deployment template.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: citera
      POSTGRES_PASSWORD: citera
      POSTGRES_DB: citera
    ports:
      # Host 5433: local 5432 is commonly taken by other projects' databases.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citera -d citera"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
